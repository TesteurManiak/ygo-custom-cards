name: Build and Release YGO Export

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build-export-release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    luajit \
                    libvips \
                    libvips-dev \
                    libvips-tools

            - name: Download and install YGO Fabrica
              run: |
                  release_url=$(curl -fsSL https://api.github.com/repos/piface314/ygo-fabrica/releases/latest | grep -oE 'https://[^"]+\.tar\.gz' | head -n 1)
                  if [ -z "$release_url" ]; then
                    echo "Could not find a Linux .tar.gz release asset for YGO Fabrica"
                    exit 1
                  fi
                  mkdir -p /tmp/ygo-fabrica
                  curl -fL "$release_url" -o /tmp/ygo-fabrica/ygofab.tar.gz
                  tar -xzf /tmp/ygo-fabrica/ygofab.tar.gz -C /tmp/ygo-fabrica --strip-components=1
                  cd /tmp/ygo-fabrica
                  mkdir -p "$HOME/.local/bin"
                  chmod +x ./install
                  ./install
                  echo "$HOME/.local/bin" >> "$GITHUB_PATH"

            - name: Build and export project
              run: |
                  ygofab make
                  ygofab export

            - name: Check exported zip files
              run: |
                  shopt -s nullglob
                  files=(./*.zip)
                  if [ ${#files[@]} -eq 0 ]; then
                    echo "No zip files were generated by ygofab export"
                    exit 1
                  fi
                  printf "Generated zip files:\n"
                  printf " - %s\n" "${files[@]}"

            - name: Upload workflow artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ygofab-export-zips
                  path: "*.zip"
                  if-no-files-found: error

            - name: Upload release assets
              if: startsWith(github.ref, 'refs/tags/')
              uses: softprops/action-gh-release@v2
              with:
                  files: "*.zip"
                  fail_on_unmatched_files: true
